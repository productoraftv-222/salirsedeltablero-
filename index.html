<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salirse del Tablero – Sergio Gregori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8102A;
    --red-dark: #9B0A1A;
    --red-mid: #C41020;
    --red-light: #F03050;
    --white: #FFFFFF;
    --checker-size: 80px;
  }

  body {
    min-height: 100vh;
    background-color: var(--red);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* Checkerboard background */
  .checker-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      repeating-conic-gradient(var(--red-mid) 0% 25%, transparent 0% 50%);
    background-size: var(--checker-size) var(--checker-size);
    background-position: top right;
    opacity: 0.45;
    pointer-events: none;
  }

  /* Main layout */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 6vw;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Top label */
  .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .label::before {
    content: '';
    display: block;
    width: 36px;
    height: 1px;
    background: rgba(255,255,255,0.5);
  }

  /* Content grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 60px;
  }

  /* Left: text */
  .text-col {}

  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(64px, 9vw, 120px);
    line-height: 0.9;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .title .del {
    color: var(--red-dark);
  }

  .subtitle {
    margin-top: 32px;
    font-size: 15px;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
    max-width: 340px;
  }

  /* ─── CONSTRUCTION BANNER ─── */
  .banner {
    margin-top: 52px;
    display: inline-block;
    background: var(--white);
    color: var(--red-dark);
    padding: 18px 34px;
    position: relative;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    animation: pulse-banner 2.4s ease-in-out infinite;
  }
  .banner-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .banner-icon {
    font-size: 22px;
    flex-shrink: 0;
    animation: spin-slow 8s linear infinite;
  }
  .banner-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(15px, 2vw, 20px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .banner-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 2.5vw, 26px);
    letter-spacing: 0.02em;
    color: var(--red);
  }

  @keyframes pulse-banner {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Right: book cover */
  .book-col {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .book-wrap {
    position: relative;
    width: min(380px, 45vw);
    animation: float 5s ease-in-out infinite;
  }
  .book-wrap img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(-24px 32px 48px rgba(0,0,0,0.55));
    transform: perspective(900px) rotateY(-8deg) rotateX(2deg);
    transition: transform 0.4s ease;
  }
  .book-wrap:hover img {
    transform: perspective(900px) rotateY(-2deg) rotateX(0deg) scale(1.03);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  /* Intro animation */
  .page { opacity: 0; animation: fadein 0.8s 0.1s ease forwards; }
  @keyframes fadein { to { opacity: 1; } }

  /* Responsive */
  @media (max-width: 700px) {
    .grid {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    .book-col { order: -1; }
    .book-wrap { width: min(260px, 70vw); }
    .banner { padding: 14px 20px; }
  }
</style>
</head>
